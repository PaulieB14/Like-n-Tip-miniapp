<!DOCTYPE html>
<html>
<head>
    <title>Generate Images</title>
</head>
<body>
    <canvas id="canvas" width="1200" height="630" style="border: 1px solid #ccc;"></canvas>
    <br>
    <button onclick="downloadImage()">Download PNG</button>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Create gradient background
        const gradient = ctx.createLinearGradient(0, 0, 1200, 630);
        gradient.addColorStop(0, '#0052ff');
        gradient.addColorStop(1, '#7c3aed');
        
        // Fill background
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 1200, 630);
        
        // Add text
        ctx.fillStyle = 'white';
        ctx.font = 'bold 72px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('LIke n Tip', 600, 280);
        
        ctx.font = '36px Arial';
        ctx.fillText('Auto-tip when you like', 600, 340);
        
        ctx.font = '24px Arial';
        ctx.fillText('Base Mini App', 600, 380);
        
        // Add heart emoji
        ctx.font = '120px Arial';
        ctx.fillText('💖', 600, 480);
        
        function downloadImage() {
            const link = document.createElement('a');
            link.download = 'og-image.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
